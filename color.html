<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Pixel Coloring</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="coloring-screen">
    <div id="top-bar">
      <button id="back-btn" aria-label="Back">&larr;</button>
      <span id="sheet-title"></span>
      <span id="progress-text">0 / 0</span>
    </div>
    <div id="coloring-area">
      <div id="grid-wrapper">
        <div id="grid-container">
          <div id="grid-bg"></div>
          <div id="pixel-grid"></div>
        </div>
      </div>
      <div id="palette-panel"></div>
    </div>
  </div>

  <!-- Sheet data files -->
  <script src="sheets/sheet1/data.js"></script>
  <script src="sheets/sheet2/data.js"></script>
  <script src="sheets/sheet3/data.js"></script>
  <script src="sheets/sheet4/data.js"></script>
  <script src="sheets/sheet5/data.js"></script>

  <script src="js/utils.js"></script>
  <script src="js/canvas.js"></script>
</body>
</html>
